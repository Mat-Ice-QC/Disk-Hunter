version: '3.8'

services:
  disk-hunter-ui:
    image: nginx:alpine
    container_name: disk_hunter_ui
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    network_mode: host

  disk-hunter-api:
    build: ./backend
    container_name: disk_hunter_api
    restart: unless-stopped
    privileged: true 
    volumes:
      - /dev:/dev
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      - ./html/images/drives:/app/images/drives 
    network_mode: host